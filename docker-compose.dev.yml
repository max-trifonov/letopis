# Development stack: rebuilds the core from the working tree and brings
# the infrastructure up, everything tunable through the environment
# (or an .env file next to this one).
#
#   docker compose -f docker-compose.dev.yml up --build
#
# Uses config.example.yaml as-is; connections point at the compose
# services via LETOPIS_* overrides, so no local config.yaml is needed.

services:
  letopis:
    build:
      context: .
      args:
        VERSION: ${LETOPIS_VERSION:-dev}
    pull_policy: build
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LETOPIS_ROLE: ${LETOPIS_ROLE:-all}
      LETOPIS_MONGODB_URI: mongodb://mongodb:27017
      LETOPIS_REDIS_ADDR: redis:6379
      LETOPIS_LOG_LEVEL: ${LETOPIS_LOG_LEVEL:-debug}
    volumes:
      - ./config.example.yaml:/etc/letopis/config.yaml:ro
    ports:
      - "${LETOPIS_HTTP_PORT:-8080}:8080"
      - "${LETOPIS_GRPC_PORT:-9090}:9090"

  mongodb:
    image: mongo:${MONGO_VERSION:-7}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data-dev:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  mongo-data-dev:
  redis-data-dev:
